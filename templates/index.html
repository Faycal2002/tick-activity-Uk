{% extends "base.html" %}

{# ----- CONTENU DE LA PAGE ----- #}
{% block content %}

<section class="py-5 text-center">
    <div class="container">
        <h1 class="hero-title mb-2">Tick Tracker UK.</h1>
        <p class="hero-subtitle mb-4">
            Spot, report, and prevent tick-borne threats.
        </p>
        <a href="#map-section" class="btn btn-light btn-pill px-4">
            Explore Map
        </a>
    </div>
</section>

<section id="map-section" class="pb-5">
    <div class="container d-flex justify-content-center">
        <div id="map"></div>
    </div>
</section>

{% endblock %}

{# ----- SCRIPTS JS POUR CETTE PAGE ----- #}
{% block scripts %}
{{ super() }}

<script>
    // Coordonnées approximatives des grandes villes UK (lat, lng)
    const cityCoords = {
        "London": [51.5074, -0.1278],
        "Manchester": [53.4808, -2.2426],
        "Birmingham": [52.4862, -1.8904],
        "Liverpool": [53.4084, -2.9916],
        "Leeds": [53.8008, -1.5491],
        "Bristol": [51.4545, -2.5879],
        "Edinburgh": [55.9533, -3.1883],
        "Glasgow": [55.8642, -4.2518],
        "Newcastle": [54.9783, -1.6178],
        "Sheffield": [53.3811, -1.4701],
        "Nottingham": [52.9548, -1.1581],
        "Cardiff": [51.4816, -3.1791],
        "Belfast": [54.5973, -5.9301],
        "Southampton": [50.9097, -1.4043],
        "Leicester": [52.6369, -1.1398]
    };

    // --- Icône rouge sans ombre ---
    const redIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        iconSize: [25, 41],        // taille du marker
        iconAnchor: [12, 41],      // point d'ancrage sur la pointe
        popupAnchor: [1, -34],     // où la popup s'ouvre par rapport au marker
        shadowUrl: null            // pas d'ombre
    });

    // Récupérer les données de tiques depuis Flask
    async function fetchSightings() {
        const res = await fetch("/api/sightings");
        if (!res.ok) {
            console.error("Impossible de charger les données");
            return [];
        }
        return await res.json();
    }

    // Nettoyer le nom de ville ("London, UK" -> "London")
    function normalizeCityName(raw) {
        if (!raw) return "";
        return raw.split(",")[0].trim();
    }

    async function initLeafletMap() {
        const mapElement = document.getElementById("map");

        // Créer la carte centrée sur le UK
        const map = L.map(mapElement).setView([54.5, -3.0], 5.5);

        // Fond de carte OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Charger les ticks depuis l'API Elanco (via Flask)
        const sightings = await fetchSightings();
        console.log("Nombre de sightings reçus :", sightings.length);

        let countMarkers = 0;
        const unknownCities = new Set();

        sightings.forEach(s => {
            // ville = soit s.location (Excel), soit s.city (API JSON)
            const rawCity = s.location || s.city;
            const cleanCity = normalizeCityName(rawCity);
            const coords = cityCoords[cleanCity];

            if (!coords) {
                unknownCities.add(rawCity);
                return;
            }

            // 🔴 Marker rouge sans ombre
            const marker = L.marker(coords, { icon: redIcon }).addTo(map);

            marker.bindPopup(`
                    <strong>${s.species}</strong><br>
                    <em>${s.latinName}</em><br>
                    ${rawCity}<br>
                    <small>${new Date(s.date).toLocaleString()}</small>
                `);

            countMarkers++;
        });

        console.log("Nombre de markers placés :", countMarkers);
        if (unknownCities.size > 0) {
            console.warn("Villes sans coordonnées :", Array.from(unknownCities));
        }
    }

    // Lancer la carte une fois la page chargée
    document.addEventListener("DOMContentLoaded", initLeafletMap);
</script>
{% endblock %}
