{% extends "base.html" %}

{% block content %}

<div class="container py-5 mt-5" style="max-width: 1200px;">

    <!-- Filtres -->
    <div class="card bg-dark text-light p-3 mb-4 shadow-sm rounded-lg filters-card">
        <div class="row">

            <div class="col-md-4">
                <label class="filter-label">Date range</label>
                <select id="filter-date" class="form-control bg-black border-secondary">
                    <option value="all" selected>All time</option>
                    <option value="30">Last 30 days</option>
                    <option value="7">Last 7 days</option>
                    <option value="90">Last 90 days</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="filter-label">Species</label>
                <select id="filter-species" class="form-control bg-black border-secondary">
                    <option value="all">Any</option>
                    <option value="Ixodes apronophorus">Ixodes apronophorus</option>
                    <option value="Ixodes acuminatus">Ixodes acuminatus</option>
                    <option value="Dermacentor frontalis">Dermacentor frontalis</option>
                    <option value="Ixodes arboricola">Ixodes arboricola</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="filter-label">Severity</label>
                <select id="filter-severity" class="form-control bg-black border-secondary">
                    <option value="all">Any</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

        </div>
    </div>

    <!-- Carte + Résultats -->
    <div class="row">

        <!-- Carte -->
        <div class="col-lg-8 mb-3">
            <div class="card bg-dark p-3 shadow-sm rounded-lg map-results-card">
                <h5 class="text-light text-center mb-3">UK Tick Sightings</h5>

                <div id="map"></div>

                <!-- Légende -->
                <div class="d-flex justify-content-center mt-3">
                    <span class="legend-dot bg-success"></span> Low
                    <span class="legend-dot bg-warning ml-3"></span> Medium
                    <span class="legend-dot bg-danger ml-3"></span> High
                </div>
            </div>
        </div>

        <!-- Résultats -->
        <div class="col-lg-4">
            <div class="card bg-dark text-light p-3 shadow-sm rounded-lg map-results-card">
                <h5 class="mb-3">Results</h5>
                <div id="results-list" class="results-scroll"></div>
            </div>
        </div>

    </div>

    <!-- TIMELINE / SEASONAL ACTIVITY -->
    <div class="row mt-4">
        <div class="col-12">
            <div class="card bg-dark text-light p-3 shadow-sm rounded-lg">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
                    <h5 class="mb-2">Seasonal tick activity</h5>

                    <div class="d-flex flex-wrap">
                        <div class="mr-2 mb-2">
                            <label class="filter-label mb-1" for="timeline-city">City</label>
                            <select id="timeline-city"
                                    class="form-control bg-black border-secondary"
                                    style="min-width: 180px;">
                                <option value="">Select a city</option>
                                <!-- options remplies en JS -->
                            </select>
                        </div>

                        <div class="mb-2">
                            <label class="filter-label mb-1" for="timeline-year">Year</label>
                            <select id="timeline-year"
                                    class="form-control bg-black border-secondary"
                                    style="min-width: 140px;">
                                <option value="">All years</option>
                                <!-- options remplies en JS -->
                            </select>
                        </div>
                    </div>
                </div>

                <canvas id="timeline-chart" height="80"></canvas>
                <p class="text-muted mt-2 mb-0" id="timeline-note">
                    Select a city and year to see tick sightings over time.
                </p>
            </div>
        </div>
    </div>

</div>

{% endblock %}

{% block scripts %}
{{ super() }}

<script>
    let map;
    let markers = [];
    let allSightings = [];
    let timelineChart = null;

    const cityCoords = {
        "London": [51.5074, -0.1278],
        "Manchester": [53.4808, -2.2426],
        "Birmingham": [52.4862, -1.8904],
        "Liverpool": [53.4084, -2.9916],
        "Leeds": [53.8008, -1.5491],
        "Bristol": [51.4545, -2.5879],
        "Edinburgh": [55.9533, -3.1883],
        "Glasgow": [55.8642, -4.2518],
        "Newcastle": [54.9783, -1.6178],
        "Sheffield": [53.3811, -1.4701],
        "Nottingham": [52.9548, -1.1581],
        "Cardiff": [51.4816, -3.1791],
        "Belfast": [54.5973, -5.9301],
        "Southampton": [50.9097, -1.4043],
        "Leicester": [52.6369, -1.1398],

        // villes ajoutées
        "Portsmouth": [50.8198, -1.0880],
        "Brighton": [50.8225, -0.1372],
        "Hull": [53.7676, -0.3274],
        "Wolverhampton": [52.5862, -2.1288],
        "Derby": [52.9225, -1.4746],
        "Stoke-on-Trent": [53.0027, -2.1794],
        "Coventry": [52.4068, -1.5197],
        "Sunderland": [54.9069, -1.3838],
        "Reading": [51.4543, -0.9781],
        "Plymouth": [50.3755, -4.1427],
        "York": [53.9590, -1.0815],
        "Aberdeen": [57.1497, -2.0943],
        "Dundee": [56.4620, -2.9707],
        "Swansea": [51.6214, -3.9436],
        "Milton Keynes": [52.0406, -0.7594],
        "Northampton": [52.2405, -0.9027],
        "Luton": [51.8787, -0.4200]
    };

    function normalizeCityName(raw) {
        if (!raw) return "";
        return raw.split(",")[0].trim();
    }

    const severityColors = {
        low: "green",
        medium: "orange",
        high: "red"
    };

    const severityTextClass = {
        low: "text-success",
        medium: "text-warning",
        high: "text-danger"
    };

    function createColoredIcon(color) {
        return L.divIcon({
            className: "custom-pin",
            html: `<span style="font-size:28px; color:${color}">●</span>`
        });
    }

    async function fetchSightings() {
        const res = await fetch("/api/sightings");
        if (!res.ok) {
            console.error("Erreur /api/sightings", res.status);
            return [];
        }
        const data = await res.json();
        console.log("Données sightings:", data);
        return data;
    }

    function filterRows(rows) {
        const dateFilter = document.getElementById("filter-date").value;
        const speciesFilter = document.getElementById("filter-species").value;
        const now = new Date();

        return rows.filter(r => {
            const d = new Date(r.date);

            if (speciesFilter !== "all" && r.latinName !== speciesFilter) return false;

            if (dateFilter !== "all") {
                const limitDays = parseInt(dateFilter);
                const diff = (now - d) / (1000 * 3600 * 24);
                if (diff > limitDays) return false;
            }

            return true;
        });
    }

    // Regroupe les sightings par ville
    function aggregateByCity(rows, severityMap = null) {
        const stats = {};

        rows.forEach(r => {
            const city = normalizeCityName(r.city || r.location);
            if (!city) return;

            if (!stats[city]) {
                stats[city] = {
                    city,
                    count: 0,
                    latestDate: null,
                    latestSighting: null
                };
            }

            stats[city].count++;

            const d = new Date(r.date);
            if (!stats[city].latestDate || d > stats[city].latestDate) {
                stats[city].latestDate = d;
                stats[city].latestSighting = r;
            }
        });

        const list = Object.values(stats);
        if (list.length === 0) return [];

        // garder les severities globales si fournies
        if (severityMap) {
            list.forEach(c => {
                c.severity = severityMap[c.city] || "low";
            });
            return list;
        }

        // calcul des severities globales : <60 low, 60–70 medium, >70 high
        list.forEach(c => {
            if (c.count < 60) {
                c.severity = "low";
            } else if (c.count <= 70) {
                c.severity = "medium";
            } else {
                c.severity = "high";
            }
        });

        return list;
    }

    function filterBySeverity(cityList) {
        const severityFilter = document.getElementById("filter-severity").value;
        if (severityFilter === "all") return cityList;
        return cityList.filter(c => c.severity === severityFilter);
    }

    function renderList(cities) {
        const container = document.getElementById("results-list");
        container.innerHTML = "";

        if (cities.length === 0) {
            container.innerHTML = "<p class='text-muted'>No results.</p>";
            return;
        }

        cities.sort((a, b) => b.count - a.count);

        cities.forEach(c => {
            const sevClass = severityTextClass[c.severity] || "text-light";
            const last = c.latestSighting;

            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.city + ", UK")}`;

            container.innerHTML += `
                <div class="result-item mb-3 pb-2 border-bottom border-secondary">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong class="${sevClass}">${c.city}</strong><br>
                            <small>${c.count} sightings • last on ${c.latestDate.toLocaleDateString()}</small><br>
                            <small>${last ? `${last.species} — ${last.latinName || ""}` : ""}</small>
                        </div>
                        <span class="legend-dot" style="background:${severityColors[c.severity]}"></span>
                    </div>

                    <div class="mt-2 d-flex flex-wrap gap-2">
                        <a href="/report" class="btn btn-sm btn-light mr-2">
                            Report a sighting
                        </a>
                        <a href="${mapsUrl}" target="_blank" class="btn btn-sm btn-outline-light mr-2">
                            Get directions
                        </a>
                        <button class="btn btn-sm btn-outline-light btn-share" data-city="${c.city}">
                            Share
                        </button>
                    </div>
                </div>
            `;
        });
    }

    function renderMarkers(cities) {
        markers.forEach(m => m.remove());
        markers = [];

        cities.forEach(c => {
            const coords = cityCoords[c.city];
            if (!coords) return;

            const color = severityColors[c.severity] || "gray";
            const icon = createColoredIcon(color);
            const last = c.latestSighting;

            const directionsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.city + ", UK")}`;

            const popupHtml = `
                <div style="min-width: 220px">
                    <strong>${c.city}</strong><br>
                    ${c.count} sightings<br>
                    ${last ? `${last.species} — ${last.latinName || ""}<br>` : ""}
                    <small>Last: ${c.latestDate.toLocaleString()}</small>
                    <hr style="border-color:#444; margin:6px 0">
                    <div class="d-flex flex-column">
                        <a class="btn btn-sm btn-light mb-1" href="/report">
                            Report a sighting
                        </a>
                        <a class="btn btn-sm btn-outline-light mb-1" href="${directionsUrl}" target="_blank" rel="noopener">
                            Get directions
                        </a>
                        <button class="btn btn-sm btn-outline-light mb-1 popup-share-btn"
                                data-city="${c.city}" data-count="${c.count}">
                            Share
                        </button>
                    </div>
                </div>
            `;

            const marker = L.marker(coords, { icon }).addTo(map);
            marker.bindPopup(popupHtml);
            markers.push(marker);
        });
    }

    // Remplir les selects City + Year pour la timeline
    function populateTimelineSelects() {
        const citySelect = document.getElementById("timeline-city");
        const yearSelect = document.getElementById("timeline-year");

        // villes : à partir de cityCoords
        citySelect.innerHTML = '<option value="">Select a city</option>';
        Object.keys(cityCoords).sort().forEach(name => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            citySelect.appendChild(opt);
        });

        // années : à partir des données
        const yearsSet = new Set();
        allSightings.forEach(s => {
            const d = new Date(s.date);
            if (!isNaN(d.getTime())) {
                yearsSet.add(d.getFullYear());
            }
        });

        const years = Array.from(yearsSet).sort();
        yearSelect.innerHTML = '<option value="">All years</option>';
        years.forEach(y => {
            const opt = document.createElement("option");
            opt.value = String(y);
            opt.textContent = String(y);
            yearSelect.appendChild(opt);
        });
    }

    function resetTimeline() {
        const note = document.getElementById("timeline-note");
        const canvas = document.getElementById("timeline-chart");

        if (timelineChart) {
            timelineChart.destroy();
            timelineChart = null;
        }
        if (note) {
            note.textContent = "Select a city and year to see tick sightings over time.";
        }
        if (canvas) {
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    // 🔴 MODE DOUBLE :
    // - si Year vide => axe X = années, points = sightings / année
    // - si Year choisi => axe X = mois, points = sightings / mois
    function updateTimeline() {
        const city = document.getElementById("timeline-city").value;
        const yearVal = document.getElementById("timeline-year").value;
        const note = document.getElementById("timeline-note");
        const canvas = document.getElementById("timeline-chart");
        if (!canvas) return;

        if (!city) {
            resetTimeline();
            return;
        }

        // Filtre de base : par ville
        let filtered = allSightings.filter(s => {
            const cityNorm = normalizeCityName(s.city || s.location);
            if (cityNorm !== city) return false;
            const d = new Date(s.date);
            if (isNaN(d.getTime())) return false;
            // si année choisie, on filtre dessus
            if (yearVal && String(d.getFullYear()) !== yearVal) return false;
            return true;
        });

        if (filtered.length === 0) {
            if (timelineChart) {
                timelineChart.destroy();
                timelineChart = null;
            }
            if (note) {
                note.textContent = `No data for ${city}${yearVal ? " in " + yearVal : ""}. Try another selection or add a report.`;
            }
            return;
        }

        // Si aucune année choisie → ALL YEARS → axe X = années
        if (!yearVal) {
            const countsByYear = {};
            filtered.forEach(s => {
                const d = new Date(s.date);
                if (isNaN(d.getTime())) return;
                const y = d.getFullYear();
                countsByYear[y] = (countsByYear[y] || 0) + 1;
            });

            const labels = Object.keys(countsByYear)
                .map(y => Number(y))
                .sort((a, b) => a - b)
                .map(y => String(y));
            const dataArr = labels.map(y => countsByYear[Number(y)] || 0);

            if (timelineChart) {
                timelineChart.destroy();
            }

            timelineChart = new Chart(canvas.getContext("2d"), {
                type: "line",
                data: {
                    labels,
                    datasets: [{
                        label: `Sightings in ${city} (all years)`,
                        data: dataArr,
                        fill: false,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: "Year"
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: "Number of sightings"
                            },
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });

            if (note) {
                note.textContent = `Yearly tick sightings in ${city} (all years).`;
            }

            return;
        }

        // Sinon → année spécifique → axe X = mois (ton ancien comportement)
        const countsByMonth = {};
        filtered.forEach(s => {
            const d = new Date(s.date);
            if (isNaN(d.getTime())) return;
            const m = d.getMonth(); // 0–11
            countsByMonth[m] = (countsByMonth[m] || 0) + 1;
        });

        const monthLabels = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                             "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const dataArr = monthLabels.map((_, idx) => countsByMonth[idx] || 0);

        if (timelineChart) {
            timelineChart.destroy();
        }

        timelineChart = new Chart(canvas.getContext("2d"), {
            type: "line",
            data: {
                labels: monthLabels,
                datasets: [{
                    label: `Sightings in ${city} (${yearVal})`,
                    data: dataArr,
                    fill: false,
                    tension: 0.2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: "Month"
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: "Number of sightings"
                        },
                        beginAtZero: true,
                        ticks: { stepSize: 1 }
                    }
                }
            }
        });

        if (note) {
            note.textContent = `Monthly tick sightings in ${city} (${yearVal}).`;
        }
    }

    async function initMap() {
        map = L.map("map").setView([54.5, -3], 5.5);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        allSightings = await fetchSightings();

        // calcul des severities globales une seule fois
        const globalCityList = aggregateByCity(allSightings);
        const severityMap = {};
        globalCityList.forEach(c => {
            severityMap[c.city] = c.severity;
        });

        function refresh() {
            const filteredRows = filterRows(allSightings);
            let cities = aggregateByCity(filteredRows, severityMap);
            cities = filterBySeverity(cities);
            renderMarkers(cities);
            renderList(cities);
        }

        populateTimelineSelects();
        resetTimeline();
        refresh();

        // Filtres
        document
            .querySelectorAll("#filter-date, #filter-species, #filter-severity")
            .forEach(el => el.addEventListener("change", refresh));

        // Timeline selects
        document.getElementById("timeline-city").addEventListener("change", updateTimeline);
        document.getElementById("timeline-year").addEventListener("change", updateTimeline);

        // Boutons Share dans la colonne de droite
        document.addEventListener("click", async (e) => {
            const btn = e.target.closest(".btn-share");
            if (!btn) return;

            const city = btn.getAttribute("data-city");
            const shareUrl = window.location.origin + "/map?city=" + encodeURIComponent(city);

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `Tick sightings in ${city}`,
                        text: `Check recent tick activity reported in ${city}.`,
                        url: shareUrl
                    });
                } catch (err) {
                    console.error("Share cancelled or failed:", err);
                }
            } else {
                try {
                    await navigator.clipboard.writeText(shareUrl);
                    alert("Link copied to clipboard!");
                } catch (err) {
                    console.error("Clipboard error:", err);
                    alert("Unable to copy the link.");
                }
            }
        });

        // Share dans les popups Leaflet
        map.on("popupopen", (e) => {
            const popupEl = e.popup.getElement();
            if (!popupEl) return;

            const shareBtn = popupEl.querySelector(".popup-share-btn");
            if (!shareBtn) return;

            shareBtn.addEventListener("click", async () => {
                const city = shareBtn.getAttribute("data-city");
                const count = shareBtn.getAttribute("data-count");
                const text = `Tick activity in ${city} — ${count} sightings`;
                const url = window.location.href;

                if (navigator.share) {
                    try {
                        await navigator.share({ title: "Tick Tracker UK", text, url });
                    } catch (err) {
                        console.error("Share cancelled or failed:", err);
                    }
                } else {
                    try {
                        await navigator.clipboard.writeText(`${text} ${url}`);
                        alert("Link copied to clipboard ✅");
                    } catch (err) {
                        console.error("Clipboard error:", err);
                        alert("Unable to copy the link.");
                    }
                }
            });
        });
    }

    document.addEventListener("DOMContentLoaded", initMap);
</script>

{% endblock %}
